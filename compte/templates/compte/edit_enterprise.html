{% extends "base.html" %}

{% block content %}
<section class="page-hero page-hero-sm">
    <div class="container reveal">
        <h1>Modifier le profil entreprise</h1>
    </div>
</section>

<section class="section">
    <div class="container">
        <form class="register-form reveal" method="POST">
            <fieldset class="form-section-card">
                <legend>Entreprise</legend>
                <div class="form-row">
                    <div class="form-group">
                        <label for="company_name">Raison sociale</label>
                        <input type="text" id="company_name" name="company_name" required value="{{ profile.name }}">
                    </div>
                    <div class="form-group">
                        <label for="sector">Secteur</label>
                        <input type="text" id="sector" name="sector" value="{{ profile.sector or '' }}">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label for="country">Pays</label><input type="text" id="country" name="country" value="{{ profile.country or '' }}"></div>
                    <div class="form-group"><label for="city">Ville</label><input type="text" id="city" name="city" value="{{ profile.city or '' }}"></div>
                    <div class="form-group">
                        <label for="company_size">Taille</label>
                        <input type="text" id="company_size" name="company_size" value="{{ profile.company_size or '' }}">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label for="contact_name">Contact</label><input type="text" id="contact_name" name="contact_name" value="{{ profile.contact_name or '' }}"></div>
                    <div class="form-group"><label for="contact_role">Fonction</label><input type="text" id="contact_role" name="contact_role" value="{{ profile.contact_role or '' }}"></div>
                    <div class="form-group"><label for="phone">Téléphone</label><input type="tel" id="phone" name="phone" value="{{ profile.phone or '' }}"></div>
                </div>
                <div class="form-group"><label for="website">Site web</label><input type="url" id="website" name="website" value="{{ profile.website or '' }}"></div>
                <div class="form-group"><label for="description">Description</label><textarea id="description" name="description" rows="3">{{ profile.description or '' }}</textarea></div>
                <div class="form-group"><label for="needs">Compétences recherchées</label><input type="text" id="needs" name="needs" value="{{ profile.needs|join(', ') if profile.needs else '' }}"></div>
            </fieldset>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Enregistrer</button>
                <a href="{{ url_for('compte.enterprise_dashboard') }}" class="btn btn-ghost">Annuler</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
