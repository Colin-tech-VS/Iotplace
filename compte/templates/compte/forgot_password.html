{% extends "base.html" %}
{% from "compte/_macros.html" import field_value %}

{% block content %}
<section class="page-hero page-hero-sm">
    <div class="container reveal">
        <h1>{{ t('compte.forgot_password_title') }}</h1>
        <p class="page-sub">{{ t('compte.forgot_password_sub') }}</p>
    </div>
</section>

<section class="section">
    <div class="container auth-wrap">
        <form class="auth-form reveal" method="POST">
            <div class="form-group">
                <label for="email">{{ t('compte.email') }}</label>
                <input type="email" id="email" name="email" required placeholder="{{ t('compte.email_ph') }}" value="{{ field_value(form, 'email') }}">
            </div>
            <button type="submit" class="btn btn-primary btn-lg">{{ t('compte.forgot_password_btn') }}</button>
            <p class="form-footer-link"><a href="{{ url_for('compte.login') }}">{{ t('compte.login_link') }}</a></p>
        </form>
    </div>
</section>
{% endblock %}
