{% from "compte/_macros.html" import field_value %}
{% set required = sector_required|default(false) %}
<div class="form-group domain-field" data-sector-field>
    <span class="domain-field-label">{{ t('sectors.label') }}{% if required %} <span class="req">*</span>{% endif %}</span>
    <p class="field-hint domain-field-hint">{{ t('sectors.hint') }}</p>
    <input type="hidden" name="sector_id" id="sector_id" value="{{ field_value(form, 'sector_id') }}" data-sector-input {% if required %}required{% endif %}>
    <div class="domain-cards-grid" role="radiogroup" aria-label="{{ t('sectors.label') }}">
        {% for group in iot_sector_groups %}
        {% for item in group['items'] %}
        <button type="button"
                class="domain-card{% if field_value(form, 'sector_id') == item.id %} domain-card-selected{% endif %}"
                data-domain-card
                data-sector-id="{{ item.id }}"
                data-tagline="{{ item.tagline|e }}"
                aria-pressed="{{ 'true' if field_value(form, 'sector_id') == item.id else 'false' }}">
            <span class="domain-card-stars" aria-label="{{ t('sectors.potential_label') }}: {{ item.stars }}/5">{{ item.stars_label }}</span>
            <strong class="domain-card-name">{{ item.name }}</strong>
            <span class="domain-card-tagline">{{ item.tagline }}</span>
        </button>
        {% endfor %}
        {% endfor %}
    </div>
</div>
