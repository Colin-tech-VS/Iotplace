{% extends "base.html" %}

{% block content %}
<section class="page-hero page-hero-sm">
    <div class="container reveal">
        <h1>{{ t('compte.reset_password_title') }}</h1>
        <p class="page-sub">{{ t('compte.reset_password_sub') }}</p>
    </div>
</section>

<section class="section">
    <div class="container auth-wrap">
        <form class="auth-form reveal" method="POST">
            <div class="form-group">
                <label for="password">{{ t('compte.password') }}</label>
                <input type="password" id="password" name="password" required minlength="8" placeholder="{{ t('compte.password_ph') }}">
            </div>
            <div class="form-group">
                <label for="password_confirm">{{ t('compte.password_confirm') }}</label>
                <input type="password" id="password_confirm" name="password_confirm" required minlength="8">
            </div>
            <button type="submit" class="btn btn-primary btn-lg">{{ t('compte.reset_password_btn') }}</button>
        </form>
    </div>
</section>
{% endblock %}
