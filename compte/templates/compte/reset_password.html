{% extends "register_layout.html" %}

{% block title %}{{ t('compte.reset_password_title') }}{% endblock %}

{% block auth_header_link %}
<a href="{{ url_for('compte.login') }}" class="reg-wizard-header-link">{{ t('compte.login_link') }}</a>
{% endblock %}

{% block wizard %}
<div class="reg-wizard-layout reg-wizard-layout--narrow">
    <div class="reg-wizard-main">
        <h1 class="reg-wizard-title">{{ t('compte.reset_password_title') }}</h1>
        <p class="reg-wizard-sub">{{ t('compte.reset_password_sub') }}</p>
        <form class="reg-auth-form" method="POST">
            <div class="form-group">
                <label for="password">{{ t('compte.password') }}</label>
                <input type="password" id="password" name="password" required minlength="8" placeholder="{{ t('compte.password_ph') }}" autocomplete="new-password">
            </div>
            <div class="form-group">
                <label for="password_confirm">{{ t('compte.password_confirm') }}</label>
                <input type="password" id="password_confirm" name="password_confirm" required minlength="8" autocomplete="new-password">
            </div>
            <div class="reg-wizard-actions reg-wizard-actions--single">
                <button type="submit" class="btn btn-primary btn-glow">{{ t('compte.reset_password_btn') }}</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
