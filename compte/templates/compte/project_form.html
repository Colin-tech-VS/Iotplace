{% extends "base.html" %}
{% from "compte/_macros.html" import field_value %}

{% block content %}
<section class="page-hero page-hero-sm">
    <div class="container reveal">
        <a href="{{ url_for('compte.enterprise_dashboard') }}" class="back-link">← Retour</a>
        <h1>Nouveau projet IoT</h1>
    </div>
</section>

<section class="section">
    <div class="container">
        <form class="register-form reveal" method="POST">
            <fieldset class="form-section-card">
                <div class="form-group">
                    <label for="title">Titre du projet <span class="req">*</span></label>
                    <input type="text" id="title" name="title" required value="{{ field_value(form, 'title') }}">
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" rows="4">{{ field_value(form, 'description') }}</textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="budget">Budget</label>
                        <select id="budget" name="budget">
                            <option value="">— Choisir —</option>
                            {% for b in ['< 10k€', '10k–50k€', '50k–150k€', '150k–500k€', '500k€+'] %}
                            <option value="{{ b }}">{{ b }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="duration">Durée</label>
                        <select id="duration" name="duration">
                            <option value="">— Choisir —</option>
                            {% for d in ['< 1 mois', '1–3 mois', '3–6 mois', '6–12 mois', '12+ mois'] %}
                            <option value="{{ d }}">{{ d }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="skills">Compétences requises (virgules)</label>
                    <input type="text" id="skills" name="skills" placeholder="Firmware, LoRaWAN, Cloud IoT">
                </div>
            </fieldset>
            <button type="submit" class="btn btn-primary">Publier le projet</button>
        </form>
    </div>
</section>
{% endblock %}
