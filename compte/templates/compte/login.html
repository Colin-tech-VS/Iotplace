{% extends "base.html" %}
{% from "compte/_macros.html" import field_value %}

{% block content %}
<section class="page-hero page-hero-sm">
    <div class="container reveal">
        <h1>Connexion</h1>
        <p class="page-sub">Accédez à votre espace entreprise ou startup.</p>
    </div>
</section>

<section class="section">
    <div class="container auth-wrap">
        <form class="auth-form reveal" method="POST">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="vous@entreprise.com" value="{{ field_value(form, 'email') }}">
            </div>
            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" required placeholder="••••••••" minlength="8">
            </div>
            <button type="submit" class="btn btn-primary btn-lg btn-glow">Se connecter</button>
        </form>

        <div class="auth-links reveal">
            <p>Pas encore de compte ?</p>
            <a href="{{ url_for('compte.register_enterprise') }}" class="btn btn-outline">Inscription entreprise</a>
            <a href="{{ url_for('compte.register_startup') }}" class="btn btn-outline">Inscription startup</a>
        </div>
    </div>
</section>
{% endblock %}
