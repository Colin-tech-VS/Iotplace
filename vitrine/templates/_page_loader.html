<div id="iot-page-loader" class="iot-page-loader is-active" role="status" aria-live="polite" aria-busy="true">
    <div class="iot-page-loader-inner">
        <div class="iot-page-loader-mark" aria-hidden="true">
            <span>⬡</span>
            <span class="iot-page-loader-ring"></span>
        </div>
        <p class="iot-page-loader-text">{% if locale|default('en') == 'fr' %}Chargement{% else %}Loading{% endif %}</p>
        <p class="iot-page-loader-sub">{% if locale|default('en') == 'fr' %}Connexion à la plateforme…{% else %}Connecting to the platform…{% endif %}</p>
        <div class="iot-page-loader-bar" aria-hidden="true"><span></span></div>
    </div>
</div>
