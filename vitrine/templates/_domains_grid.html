{# 5 focus IoT domains #}
<section class="section section-alt" id="domains">
    <div class="container">
        <div class="section-header reveal">
            <h2>{{ t('home.domains_title') }}</h2>
            <p>{{ t('home.domains_sub') }}</p>
        </div>
        <div class="domain-showcase-grid reveal">
            {% for domain in iot_domains %}
            <article class="domain-showcase-card domain-{{ domain.id }}">
                <span class="domain-showcase-stars" title="{{ t('sectors.potential_label') }}">{{ domain.stars_label }}</span>
                <h3>{{ domain.name }}</h3>
                <p>{{ domain.tagline }}</p>
            </article>
            {% endfor %}
        </div>
    </div>
</section>
