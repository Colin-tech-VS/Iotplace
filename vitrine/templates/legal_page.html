{% extends "base.html" %}
{% block title %}{{ page.title }}{% endblock %}

{% block content %}
<section class="page-hero">
    <div class="container reveal">
        <h1>{{ page.title }}</h1>
        <p class="page-sub">{{ page.subtitle }}</p>
    </div>
</section>

<section class="section">
    <div class="container legal-content reveal">
        {{ page.body_html|safe }}
    </div>
</section>
{% endblock %}
