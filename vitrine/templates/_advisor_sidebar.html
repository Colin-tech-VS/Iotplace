{% if advisor_enabled %}
{% macro advisor_orb(uid) %}
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="advisorOrbGrad{{ uid }}" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e8c8"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="advisorOrbGlow{{ uid }}" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e8c8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="16" cy="16" r="14" fill="url(#advisorOrbGlow{{ uid }})" opacity="0.5"/>
  <circle cx="16" cy="16" r="10" stroke="url(#advisorOrbGrad{{ uid }})" stroke-width="1.5" fill="rgba(0,232,200,0.08)"/>
  <circle cx="16" cy="16" r="4" fill="url(#advisorOrbGrad{{ uid }})"/>
  <path d="M16 6 L16 10 M16 22 L16 26 M6 16 L10 16 M22 16 L26 16" stroke="url(#advisorOrbGrad{{ uid }})" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
</svg>
{% endmacro %}

<div id="advisor-root" class="advisor-root" data-chat-url="{{ url_for('vitrine.advisor_chat') }}">
    <button type="button" class="advisor-fab" id="advisor-fab" aria-label="{{ t('advisor.fab_label') }}" aria-expanded="false" aria-controls="advisor-panel">
        <span class="advisor-fab-orb" aria-hidden="true">{{ advisor_orb('fab') }}</span>
        <span class="advisor-fab-text">{{ t('advisor.fab_label') }}</span>
    </button>

    <div class="advisor-overlay" id="advisor-overlay" hidden></div>

    <aside class="advisor-panel" id="advisor-panel" aria-label="{{ t('advisor.title') }}" hidden>
        <header class="advisor-header">
            <div class="advisor-header-brand">
                <span class="advisor-header-orb" aria-hidden="true">{{ advisor_orb('hdr') }}</span>
                <div>
                    <strong>{{ t('advisor.title') }}</strong>
                    <small>{{ t('advisor.subtitle') }}</small>
                    <span class="advisor-status"><span class="advisor-status-dot"></span>{{ t('advisor.status_online') }}</span>
                </div>
            </div>
            <button type="button" class="advisor-close" id="advisor-close" aria-label="{{ t('advisor.close') }}">×</button>
        </header>

        <div class="advisor-profile" role="tablist" aria-label="{{ t('advisor.profile_label') }}">
            <span class="advisor-profile-label">{{ t('advisor.profile_label') }}</span>
            <button type="button" class="advisor-profile-btn active" data-profile="enterprise" role="tab" aria-selected="true">{{ t('advisor.profile_enterprise') }}</button>
            <button type="button" class="advisor-profile-btn" data-profile="startup" role="tab" aria-selected="false">{{ t('advisor.profile_startup') }}</button>
        </div>

        <div class="advisor-messages" id="advisor-messages" aria-live="polite"></div>

        <div class="advisor-suggestions" id="advisor-suggestions"></div>

        <form class="advisor-form" id="advisor-form">
            <textarea id="advisor-input" rows="2" placeholder="{{ t('advisor.placeholder') }}" maxlength="2000" required></textarea>
            <button type="submit" class="advisor-send" id="advisor-send" aria-label="{{ t('advisor.send') }}">
                <span class="advisor-send-icon" aria-hidden="true">↑</span>
            </button>
        </form>

        <footer class="advisor-footer">
            <small>{{ t('advisor.powered') }}</small>
        </footer>
    </aside>
</div>

<script>
window.IOTPLACE_ADVISOR = {
    chatUrl: {{ url_for('vitrine.advisor_chat')|tojson }},
    streamUrl: {{ url_for('vitrine.advisor_chat_stream')|tojson }},
    i18n: {
        welcomeEnterprise: {{ t('advisor.welcome_enterprise')|tojson }},
        welcomeStartup: {{ t('advisor.welcome_startup')|tojson }},
        thinking: {{ t('advisor.thinking')|tojson }},
        notConfigured: {{ t('advisor.not_configured')|tojson }},
        errorGeneric: {{ t('advisor.error_generic')|tojson }},
        suggestionsEnterprise: {{ advisor_suggestions_enterprise|tojson }},
        suggestionsStartup: {{ advisor_suggestions_startup|tojson }}
    }
};
</script>
<script defer src="{{ url_for('vitrine.static', filename='js/advisor.js') }}?v=8"></script>
{% endif %}
